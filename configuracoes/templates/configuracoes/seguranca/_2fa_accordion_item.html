{% load lucide_icons %}
<details class="card group" data-accordion-item {% if is_open %}open{% endif %}>
  <summary class="card-header flex items-center justify-between gap-4 cursor-pointer">
    <div class="flex items-center gap-3">
      <span class="flex h-12 w-12 items-center justify-center rounded-full shadow-lg shadow-[0_10px_25px_-12px_currentColor] {{ icon_badge_class }}">
        {% lucide icon class='h-6 w-6' aria_hidden='true' %}
      </span>
      <div class="space-y-1">
        <h2 class="text-lg font-semibold text-[var(--text-primary)]">{{ title }}</h2>
        <p class="text-sm text-[var(--text-secondary)]">{{ subtitle }}</p>
      </div>
    </div>
    <span class="text-[var(--text-secondary)] transition-transform duration-200 group-open:-rotate-180" data-accordion-icon>
      {% lucide 'chevron-down' class='h-5 w-5' aria_hidden='true' %}
    </span>
  </summary>

  <div class="card-body space-y-4">
    {% include content_template %}
  </div>
</details>
