{% load i18n %}
{% with modal_title_id="modal-cancel-inscricao-title-"|add:evento.pk|stringformat:"s" modal_description_id="modal-cancel-inscricao-description-"|add:evento.pk|stringformat:"s" %}
<div
  class="modal !active"
  role="dialog"
  aria-modal="true"
  aria-labelledby="{{ modal_title_id }}"
  aria-describedby="{{ modal_description_id }}"
  data-modal-root
>
  <div class="modal-content rounded-lg bg-[var(--bg-primary)] shadow-xl focus:outline-none">
    <div class="flex items-start justify-between gap-4 border-b border-[var(--border)] px-6 py-4">
      <h2 id="{{ modal_title_id }}" class="text-xl font-semibold text-[var(--text-primary)]">{{ titulo }}</h2>
      <button
        type="button"
        class="btn btn-secondary"
        aria-label="{% trans 'Fechar modal' %}"
        data-modal-dismiss
      >
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <div class="px-6 py-5 space-y-5">
      <p id="{{ modal_description_id }}" class="text-sm text-[var(--text-secondary)]">
        {{ mensagem|safe }}
      </p>
      <form
        method="post"
        action="{{ form_action }}"
        class="flex flex-col gap-3"
        hx-post="{{ form_action }}"
        hx-target="#modal"
        hx-swap="none"
      >
        {% csrf_token %}
        <div class="flex flex-col gap-3 sm:flex-row sm:justify-end sm:gap-4 border-t border-[var(--border)] pt-4">
          <button
            type="button"
            class="btn btn-secondary"
            data-modal-dismiss
          >
            {% trans 'Manter inscrição' %}
          </button>
          <button type="submit" class="btn btn-danger">
            {{ submit_label }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="{% static 'eventos/js/evento-cancelar-inscricao-modal.js' %}" defer></script>
{% endwith %}
